name: CI/CD Pipeline (ECS Fargate)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  PROJECT_NAME: shopsmart
  TF_WORKING_DIR: terraform

jobs:
  # ---------------------------------------------------------------
  # Phase 1 â€” Testing
  # ---------------------------------------------------------------
  test:
    name: Phase 1 â€” Test (server + client)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Run server lint
        working-directory: server
        run: npm run lint

      - name: Run server tests (unit + integration) with coverage
        working-directory: server
        run: npx jest --coverage --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./reports
          JEST_JUNIT_OUTPUT_NAME: junit.xml

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Run client lint
        working-directory: client
        run: npm run lint

      - name: Run client tests
        working-directory: client
        run: npm test -- --run

      - name: Upload server test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-report
          path: |
            server/reports/
            server/coverage/
          if-no-files-found: ignore

  # ---------------------------------------------------------------
  # Phase 2 â€” Infrastructure (Terraform)
  # ---------------------------------------------------------------
  terraform:
    name: Phase 2 â€” Terraform Apply
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    outputs:
      ecr_url: ${{ steps.tf_outputs.outputs.ecr_url }}
      cluster: ${{ steps.tf_outputs.outputs.cluster }}
      service: ${{ steps.tf_outputs.outputs.service }}
      task_family: ${{ steps.tf_outputs.outputs.task_family }}
      alb_dns: ${{ steps.tf_outputs.outputs.alb_dns }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_mongodb_uri: ${{ secrets.MONGODB_URI }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_mongodb_uri: ${{ secrets.MONGODB_URI }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Capture Terraform outputs
        id: tf_outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "ecr_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "cluster=$(terraform output -raw ecs_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "service=$(terraform output -raw ecs_service_name)" >> "$GITHUB_OUTPUT"
          echo "task_family=$(terraform output -raw ecs_task_family)" >> "$GITHUB_OUTPUT"
          echo "alb_dns=$(terraform output -raw alb_dns_name)" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------
  # Phase 3 â€” Build, push to ECR, and deploy to ECS
  # ---------------------------------------------------------------
  deploy:
    name: Phase 3 â€” Build, Push & Deploy (ECS Fargate)
    runs-on: ubuntu-latest
    needs: terraform
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve resource names from AWS
        id: names
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          ECR_URL="$ACCOUNT.dkr.ecr.$AWS_REGION.amazonaws.com/$PROJECT_NAME-server"
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names "$PROJECT_NAME-alb" \
            --query 'LoadBalancers[0].DNSName' \
            --output text)
          {
            echo "ecr_url=$ECR_URL"
            echo "cluster=$PROJECT_NAME-cluster"
            echo "service=$PROJECT_NAME-service"
            echo "task_family=$PROJECT_NAME-task"
            echo "alb_dns=$ALB_DNS"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved:"
          echo "  ECR_URL = $ECR_URL"
          echo "  ALB_DNS = $ALB_DNS"

      - name: Login to Amazon ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        env:
          ECR_URL: ${{ steps.names.outputs.ecr_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_URL:$IMAGE_TAG" -t "$ECR_URL:latest" ./server
          docker push "$ECR_URL:$IMAGE_TAG"
          docker push "$ECR_URL:latest"

      - name: Render new ECS task definition
        id: render_task
        env:
          TASK_FAMILY: ${{ steps.names.outputs.task_family }}
          ECR_URL: ${{ steps.names.outputs.ecr_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" \
            --query 'taskDefinition' \
            --output json > task-def.json

          jq --arg IMG "$ECR_URL:$IMAGE_TAG" '
            .containerDefinitions[0].image = $IMG
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                  .compatibilities, .registeredAt, .registeredBy)
          ' task-def.json > new-task-def.json

          NEW_REVISION=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "new_revision=$NEW_REVISION" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS
        env:
          CLUSTER: ${{ steps.names.outputs.cluster }}
          SERVICE: ${{ steps.names.outputs.service }}
          NEW_REVISION: ${{ steps.render_task.outputs.new_revision }}
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$NEW_REVISION" \
            --force-new-deployment \
            > /dev/null

      - name: Wait for ECS service to stabilize
        env:
          CLUSTER: ${{ steps.names.outputs.cluster }}
          SERVICE: ${{ steps.names.outputs.service }}
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE"

      - name: Verify service is running
        env:
          CLUSTER: ${{ steps.names.outputs.cluster }}
          SERVICE: ${{ steps.names.outputs.service }}
          ALB_DNS: ${{ steps.names.outputs.alb_dns }}
        run: |
          RUNNING=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --query 'services[0].runningCount' \
            --output text)

          DESIRED=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --query 'services[0].desiredCount' \
            --output text)

          echo "Running: $RUNNING / Desired: $DESIRED"
          if [ "$RUNNING" != "$DESIRED" ]; then
            echo "::error::ECS service has not reached desired count"
            exit 1
          fi

          echo "App URL: http://$ALB_DNS"
          echo "Health check:"
          for i in 1 2 3 4 5; do
            if curl -fsS "http://$ALB_DNS/api/health"; then
              echo
              echo "Service is healthy."
              exit 0
            fi
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "::error::Health check failed after retries"
          exit 1
